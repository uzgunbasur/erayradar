<!DOCTYPE html>
<html>
<head>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; }
        /* Flightradar24 haritasını arkaya gömüyoruz */
        iframe { width: 100%; height: 100%; border: none; }
        
        /* Senin şık panelin */
        .overlay-panel {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0, 0, 0, 0.85); padding: 25px;
            border-radius: 20px; border: 2px solid #00d4ff;
            color: white; font-family: 'Arial', sans-serif;
            pointer-events: none; /* Mouse tıklamalarını engeller, yayıncıyı yormaz */
        }
        .title { color: #00d4ff; font-weight: bold; font-size: 20px; text-align: center; margin-bottom: 15px; }
        .data { margin: 8px 0; font-size: 16px; }
    </style>
</head>
<body>
    <!-- Flightradar24 Canlı Veri -->
    <iframe src="https://www.flightradar24.com/data/flights/tk179"></iframe>

    <!-- Senin Şık Tasarımın -->
    <div class="overlay-panel">
        <div class="title">✈️ ERAY AMERİKA YOLCUSU</div>
        <div class="data">📍 Durum: Canlı Takip (TK179)</div>
        <div class="data">⏱️ Kaptan: Eray Can Özkenar</div>
        <div class="data" style="color: #00d4ff; font-size: 12px; margin-top: 10px;">*Veriler Flightradar24'ten çekilmektedir.</div>
    </div>
</body>
</html>
