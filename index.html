<!DOCTYPE html>
<html>
<head>
<style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; }
    
    /* Radar Haritası (Altta dönecek) */
    .radar-frame {
        position: absolute; top: 0; left: 0;
        width: 100%; height: 100%; border: none;
    }
    
    /* Senin Şık Bilgi Kartın (Sağ Üstte) */
    .card {
        position: absolute; top: 20px; right: 20px;
        width: 300px; background: rgba(0, 0, 0, 0.85);
        border: 2px solid #00d4ff; border-radius: 15px;
        padding: 20px; color: white; pointer-events: none;
        box-shadow: 0 0 15px #00d4ff; z-index: 100;
    }
    .header { font-size: 18px; font-weight: bold; color: #00d4ff; margin-bottom: 10px; }
    .data { margin: 8px 0; font-size: 15px; }
    .plane { font-size: 30px; display: inline-block; animation: fly 3s infinite ease-in-out; }
    @keyframes fly { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
</style>
</head>
<body>
    <!-- Burası radar sitesini çeken kısım -->
    <iframe class="radar-frame" src="https://www.flightradar24.com/simple/51.50,-0.12/6" scrolling="no"></iframe>

    <!-- Burası senin tasarımın -->
    <div class="card">
        <div class="header">✈️ UÇUŞ TAKİP <span class="plane">✈️</span></div>
        <div class="data">📍 <b>TK179 - LOS ANGELES</b></div>
        <div class="data">🌍 <b>Canlı Takip:</b> Aktif</div>
    </div>
</body>
</html>
