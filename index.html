<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; padding: 0; background: transparent; font-family: 'Segoe UI', sans-serif; color: white; }
        .overlay-container {
            width: 800px; background: rgba(10, 10, 15, 0.9);
            border: 2px solid #00d4ff; border-radius: 20px;
            padding: 25px; box-shadow: 0 0 20px #00d4ff;
        }
        .header { text-align: center; font-size: 26px; color: #00d4ff; margin-bottom: 20px; font-weight: bold; }
        .track-line { 
            display: flex; justify-content: space-between; align-items: center;
            height: 4px; background: #333; margin: 30px 0; position: relative;
        }
        .plane-icon { font-size: 30px; position: absolute; left: 50%; transform: translateX(-50%); }
        .info { font-size: 18px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="overlay-container">
        <div class="header">✈️ TK179 UÇUŞ TAKİP</div>
        <div class="track-line">
            <span>IST</span>
            <span class="plane-icon">✈️</span>
            <span>LAX</span>
        </div>
        <div class="info" id="status">📍 <b>Konum:</b> Okyanus Üstü</div>
        <div class="info">📡 <b>Veri:</b> Canlı</div>
    </div>
</body>
</html>
